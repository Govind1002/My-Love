<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Love | Gaurav</title>
  <meta name="description" content="A romantic audio player with typewriter lyrics and photo gallery." />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Hero Section -->
  <header class="hero">
    <div class="hero-img-wrapper">
      <img src="asset/1.jpg" alt="Romantic Scenery" class="hero-img">
    </div>
    <div class="overlay"></div>
    <h1>Our Love..</h1>
  </header>

  <main class="container">

    <!-- Lyrics -->
    <section class="lyrics-container" aria-live="polite">
      <div id="lyrics-box" class="lyrics"></div>
      <span class="cursor">|</span>
    </section>

    <!-- Controls -->
    <section class="player-controls">

      <div class="time-display">
        <span id="current-time">0:00</span> /
        <span id="total-time">0:00</span>
      </div>

      <button id="play-btn" class="play-btn" aria-label="Play Song">

        <svg id="icon-play" viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
          <path d="M8 5v14l11-7z" />
        </svg>

        <svg id="icon-pause" class="hidden" viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>

      </button>

      <audio id="audio-player" preload="metadata">
        <source src="Sambhal Ke Rakha Wo Phool Mera Tu - Finding Her _ Kushagra _ Hindi.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>

      <div class="toggle-wrapper">
        <label class="switch">
          <input type="checkbox" id="typing-toggle" checked>
          <span class="slider round"></span>
        </label>
        <span class="toggle-label">Typewriter Effect</span>
      </div>

    </section>

    <!-- Gallery -->
    <section class="gallery-section">

      <h2>Memories</h2>

      <div class="gallery-grid">

        <div class="gallery-item">
          <img src="asset/img1.avif" data-full="asset/img1.jpg" alt="Memory 1" loading="lazy">
          <div class="caption">♡ I love you ♡</div>
        </div>

        <div class="gallery-item">
          <img src="asset/img2.avif" data-full="asset/img2.jpg" alt="Memory 2" loading="lazy">
          <div class="caption">♡ I love you ♡</div>
        </div>

        <div class="gallery-item">
          <img src="asset/img3.jpg" data-full="asset/img3.jpg" alt="Memory 3" loading="lazy">
          <div class="caption">♡ I love you ♡</div>
        </div>

        <div class="gallery-item">
          <img src="asset/img4.png" data-full="asset/img4.jpg" alt="Memory 4" loading="lazy">
          <div class="caption">♡ I love you ♡</div>
        </div>

        <div class="gallery-item">
          <img src="asset/img5.jpg" data-full="asset/img5.jpg" alt="Memory 5" loading="lazy">
          <div class="caption">♡ I love you ♡</div>
        </div>

        <div class="gallery-item">
          <img src="asset/img6.jpg" data-full="asset/img6.jpg" alt="Memory 6" loading="lazy">
          <div class="caption">♡ I love you ♡</div>
        </div>

      </div>

      <div class="design">
        <b>♡ I love you ♡</b>
      </div>

    </section>

  </main>

  <footer>
    <p>ᯓ➤ To : My Love ❤️</p>
    <p>ᯓ➤ From : Gaurav</p>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog">

    <button id="lb-close" class="lb-close" aria-label="Close Gallery">&times;</button>
    <button id="lb-prev" class="lb-nav lb-prev" aria-label="Previous Image">&#10094;</button>

    <div class="lb-content">
      <img id="lb-img" src="" alt="Enlarged view">
      <p id="lb-caption"></p>
    </div>

    <button id="lb-next" class="lb-nav lb-next" aria-label="Next Image">&#10095;</button>

  </div>

  <script src="script.js"></script>

</body>
</html>
